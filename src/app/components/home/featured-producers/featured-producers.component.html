<h2 nz-typography>Mejores productores</h2>
<div
  class="producers-container"
  nz-row
  [nzJustify]="'center'"
  [nzAlign]="'middle'"
>
  @for (producer of tempProducers; track producer.id) {
  <div nz-col [nzSpan]="span" [class.single-column]="span === 24">
    <div class="card-container">
      <app-featured-producer-card [producer]="producer" />
    </div>
  </div>
  }
</div>
